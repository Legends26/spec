<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚽ ボール蹴り返しゲーム 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050d05;
      overflow: hidden;
      font-family: 'Noto Sans JP', sans-serif;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 20;
      align-items: center;
      background: rgba(0,10,0,0.65);
      padding: 8px 24px;
      border-radius: 8px;
      border: 1px solid rgba(46,125,50,0.5);
    }

    .stat {
      color: #e8f5e9;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #4caf50;
    }

    .stat span {
      color: #76ff03;
      font-size: 1.7rem;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,10,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 30;
    }

    #overlay h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      color: #76ff03;
      text-shadow: 0 0 20px #76ff03, 0 0 40px #4caf50;
      letter-spacing: 4px;
    }

    #overlay .subtitle {
      color: #a5d6a7;
      font-size: 1.05rem;
      text-align: center;
      line-height: 1.8;
    }

    #overlay .key-hint {
      color: #69f0ae;
      font-size: 0.95rem;
      background: rgba(76,175,80,0.15);
      padding: 8px 20px;
      border: 1px solid #2e7d32;
      border-radius: 4px;
    }

    #start-btn {
      margin-top: 10px;
      padding: 14px 48px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: #e8f5e9;
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 20px #1b5e20;
      transition: all 0.2s;
    }

    #start-btn:hover {
      background: linear-gradient(135deg, #388e3c, #66bb6a);
      box-shadow: 0 0 30px #4caf50;
      transform: scale(1.04);
    }

    #gameover-title {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      color: #ff5252;
      text-shadow: 0 0 20px #ff1744;
      letter-spacing: 4px;
    }

    #touch-controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      gap: 24px;
      z-index: 25;
    }

    .touch-btn {
      width: 130px;
      height: 72px;
      background: rgba(46,125,50,0.45);
      border: 2px solid #2e7d32;
      border-radius: 8px;
      color: #76ff03;
      font-size: 2.6rem;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      box-shadow: 0 0 12px rgba(76,175,80,0.3);
    }

    .touch-btn:active { background: rgba(76,175,80,0.6); }

    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>

<div id="ui">
  <div class="stat">スコア <span id="score">0</span></div>
  <div class="stat">レベル <span id="level">1</span></div>
  <div class="stat">ミス <span id="miss">0</span> / 5</div>
</div>

<div id="overlay">
  <h1>⚽ ボール蹴り返し</h1>
  <div class="subtitle">
    前方から飛んでくるボールを<br>
    足で蹴り返せ！
  </div>
  <div class="key-hint">← → カーソルキー または 画面下ボタンで移動</div>
  <button id="start-btn" onclick="startGame()">キックオフ！</button>
</div>

<div id="touch-controls">
  <button class="touch-btn" id="btn-left">&#9664;</button>
  <button class="touch-btn" id="btn-right">&#9654;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ── Three.js Setup ──────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060e06);
scene.fog = new THREE.FogExp2(0x060e06, 0.017);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:1;';
document.body.insertBefore(renderer.domElement, document.body.firstChild);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Lights ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x2a4a2a, 1.6));

const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
sun.position.set(8, 22, 6);
sun.castShadow = true;
sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top = 70;   sun.shadow.camera.bottom = -8;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

const fill = new THREE.DirectionalLight(0xb0d4ff, 0.35);
fill.position.set(-6, 9, 7);
scene.add(fill);

// ── Field ───────────────────────────────────────────────
// Grass texture (striped)
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
for (let i = 0; i < 8; i++) {
  gx.fillStyle = i % 2 === 0 ? '#1e6e1e' : '#237023';
  gx.fillRect(0, i * 64, 512, 64);
}
const grassTex = new THREE.CanvasTexture(gc);
grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
grassTex.repeat.set(3, 10);

const fieldMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(26, 72),
  new THREE.MeshLambertMaterial({ map: grassTex })
);
fieldMesh.rotation.x = -Math.PI / 2;
fieldMesh.position.set(0, 0, -35);
fieldMesh.receiveShadow = true;
scene.add(fieldMesh);

// Field lines
const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
function addLine(pts) {
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts.map(([x, z]) => new THREE.Vector3(x, 0.02, z))),
    lineMat
  ));
}
addLine([[-11, 2],  [11, 2],  [11, -69], [-11, -69], [-11, 2]]); // boundary
addLine([[-11, -33], [11, -33]]);                                  // center line
const cc = [];
for (let i = 0; i <= 64; i++) {
  const a = (i / 64) * Math.PI * 2;
  cc.push([Math.cos(a) * 5, -33 + Math.sin(a) * 5]);
}
addLine(cc);                                                        // center circle
addLine([[-7, -58], [7, -58], [7, -69], [-7, -69], [-7, -58]]);   // far penalty area
addLine([[-7, 2],   [7, 2],   [7, -9],  [-7, -9],  [-7, 2]]);     // near penalty area

// Goal posts (far, z=-70)
(function buildGoal(z) {
  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
  const postGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.8, 8);
  const lp = new THREE.Mesh(postGeo, mat); lp.position.set(-3.8, 1.4, z); scene.add(lp);
  const rp = new THREE.Mesh(postGeo, mat); rp.position.set( 3.8, 1.4, z); scene.add(rp);
  const cb = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 7.6, 8), mat);
  cb.rotation.z = Math.PI / 2; cb.position.set(0, 2.8, z); scene.add(cb);
  const net = new THREE.Mesh(
    new THREE.PlaneGeometry(7.6, 2.8, 20, 9),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
  );
  net.position.set(0, 1.4, z - 0.7); scene.add(net);
})(-70);

// Kick zone ring on ground
const kickRing = new THREE.Mesh(
  new THREE.RingGeometry(1.5, 1.72, 32),
  new THREE.MeshBasicMaterial({ color: 0x76ff03, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
);
kickRing.rotation.x = -Math.PI / 2;
kickRing.position.set(0, 0.02, -1);
scene.add(kickRing);

// ── Ball Texture ────────────────────────────────────────
const bc = document.createElement('canvas');
bc.width = bc.height = 256;
const bx = bc.getContext('2d');
bx.fillStyle = 'white';
bx.beginPath(); bx.arc(128, 128, 128, 0, Math.PI * 2); bx.fill();
bx.fillStyle = '#111';
const penta = (cx, cy, r) => {
  bx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    i === 0 ? bx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r)
            : bx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  bx.closePath(); bx.fill();
};
const [C, D, R] = [128, 72, 28];
[[C,C],[C,C-D],[C+D*.95,C-D*.31],[C+D*.59,C+D*.81],[C-D*.59,C+D*.81],[C-D*.95,C-D*.31]]
  .forEach(([x, y]) => penta(x, y, R));
const ballTex = new THREE.CanvasTexture(bc);

function makeBallMesh() {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 20, 20),
    new THREE.MeshPhongMaterial({ map: ballTex, shininess: 70 })
  );
  mesh.castShadow = true;
  return mesh;
}

// ── Particle System ─────────────────────────────────────
const MAX_P = 240;
const pPos = new Float32Array(MAX_P * 3).fill(9999);
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({ color: 0xaaff44, size: 0.18, transparent: true, opacity: 0.9, sizeAttenuation: true });
scene.add(new THREE.Points(pGeo, pMat));
let activePs = [];

function burst(x, y, z) {
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const el = (Math.random() - 0.25) * Math.PI;
    const s = 0.07 + Math.random() * 0.13;
    activePs.push({
      x, y, z,
      vx: Math.cos(el) * Math.cos(a) * s,
      vy: Math.sin(el) * s + 0.07,
      vz: Math.cos(el) * Math.sin(a) * s,
      life: 1
    });
  }
}

function updatePs() {
  for (let i = activePs.length - 1; i >= 0; i--) {
    const p = activePs[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vy -= 0.005; p.life -= 0.032;
    if (p.life <= 0) activePs.splice(i, 1);
  }
  for (let i = 0; i < MAX_P; i++) {
    const live = i < activePs.length;
    pPos[i*3]   = live ? activePs[i].x : 9999;
    pPos[i*3+1] = live ? activePs[i].y : 9999;
    pPos[i*3+2] = live ? activePs[i].z : 9999;
  }
  pGeo.attributes.position.needsUpdate = true;
}

// ── Game State ──────────────────────────────────────────
let playerX = 0, balls = [], score = 0, miss = 0, level = 1;
let frameCount = 0, spawnInterval = 90, running = false;
let keys = {};
let camBaseX = 0, shakeDecay = 0;
let animId = null;

function initGame() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  balls.forEach(b => scene.remove(b.mesh));
  balls = []; activePs = [];
  playerX = 0; camBaseX = 0; shakeDecay = 0;
  score = 0; miss = 0; level = 1; frameCount = 0; spawnInterval = 90;
  running = true;
  kickRing.position.set(0, 0.02, -1);
  updateHUD();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  loop();
}

// ── Ball Spawn ──────────────────────────────────────────
function spawnBall() {
  const mesh = makeBallMesh();
  const spawnX = (Math.random() - 0.5) * 18;
  const targetX = playerX + (Math.random() - 0.5) * 5;
  const spawnZ = -64;
  const dz = -1 - spawnZ; // ≈ 63
  const dx = targetX - spawnX;
  const speed = 0.15 + level * 0.018 + Math.random() * 0.06;
  const len = Math.hypot(dx, dz);
  mesh.position.set(spawnX, 0.3, spawnZ);
  scene.add(mesh);
  balls.push({ mesh, vx: (dx/len)*speed, vz: (dz/len)*speed, vy: 0, bounces: 0, kicked: false, kickVy: 0, kickVz: 0, kickAlpha: 1 });
}

// ── Main Loop ───────────────────────────────────────────
function loop() {
  if (!running) return;
  animId = requestAnimationFrame(loop);
  frameCount++;

  // Input
  const spd = 0.18;
  if (keys['ArrowLeft'])  playerX = Math.max(-9.5, playerX - spd);
  if (keys['ArrowRight']) playerX = Math.min( 9.5, playerX + spd);

  // Camera: smooth follow + shake
  camBaseX += (playerX * 0.13 - camBaseX) * 0.07;
  shakeDecay *= 0.82;
  camera.position.set(
    camBaseX + (Math.random() - 0.5) * shakeDecay,
    1.7  + (Math.random() - 0.5) * shakeDecay,
    0
  );
  camera.lookAt(playerX * 0.06, 0.65, -28);

  // Kick ring: follow player + pulse
  kickRing.position.x += (playerX - kickRing.position.x) * 0.14;
  kickRing.material.opacity = 0.18 + Math.abs(Math.sin(frameCount * 0.08)) * 0.14;

  // Spawn / Level up
  if (frameCount % spawnInterval === 0) spawnBall();
  if (frameCount % 400 === 0 && spawnInterval > 38) { spawnInterval -= 6; level++; updateHUD(); }

  // Update balls
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];

    if (b.kicked) {
      b.mesh.position.x += b.vx;
      b.mesh.position.y += b.kickVy;
      b.mesh.position.z += b.kickVz;
      b.kickVy -= 0.014;
      b.kickAlpha -= 0.024;
      b.mesh.material.transparent = true;
      b.mesh.material.opacity = b.kickAlpha;
      if (b.kickAlpha <= 0) { scene.remove(b.mesh); balls.splice(i, 1); }
      continue;
    }

    // Physics
    b.mesh.position.x += b.vx;
    b.mesh.position.z += b.vz;
    b.mesh.position.y += b.vy;
    b.vy -= 0.007;

    // Ground bounce
    if (b.mesh.position.y < 0.3 && b.vy < 0) {
      b.vy = Math.abs(b.vy) * 0.55;
      b.bounces++;
      if (b.bounces >= 3 || b.vy < 0.02) { b.vy = 0; b.mesh.position.y = 0.3; }
    }

    // Rolling rotation
    b.mesh.rotation.x += b.vz * 3.0;
    b.mesh.rotation.z -= b.vx * 3.0;

    // Kick detection: ball near player's feet
    const bz = b.mesh.position.z, bxp = b.mesh.position.x;
    if (bz > -2.8 && bz < 1.2 && Math.abs(bxp - playerX) < 1.8 && b.mesh.position.y < 1.8) {
      score++;
      burst(bxp, b.mesh.position.y, bz);
      b.kicked = true;
      b.kickVy = 0.22 + Math.random() * 0.08;
      b.kickVz = -(0.18 + Math.random() * 0.06);
      b.vx    = (bxp - playerX) * 0.06 + (Math.random() - 0.5) * 0.08;
      shakeDecay = 0.14;
      updateHUD();
      continue;
    }

    // Miss
    if (bz > 2.8) {
      scene.remove(b.mesh);
      balls.splice(i, 1);
      miss++;
      updateHUD();
      if (miss >= 5) { gameOver(); return; }
    }
  }

  updatePs();
  renderer.render(scene, camera);
}

// ── HUD & Game Over ─────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('miss').textContent  = miss;
}

function gameOver() {
  running = false;
  balls.forEach(b => scene.remove(b.mesh));
  balls = [];
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div id="gameover-title">💥 ゲームオーバー</div>
    <div class="stat" style="font-size:1.1rem">最終スコア <span style="font-size:2.2rem">${score}</span></div>
    <div class="stat" style="font-size:1rem">到達レベル <span>${level}</span></div>
    <button id="start-btn" onclick="startGame()" style="margin-top:10px">もう一度プレイ</button>
  `;
  ov.style.display = 'flex';
}

// ── Input ───────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function bindTouch(id, key) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart',  e => { e.preventDefault(); keys[key] = true;  }, { passive: false });
  btn.addEventListener('touchend',    e => { e.preventDefault(); keys[key] = false; }, { passive: false });
  btn.addEventListener('touchcancel', () => { keys[key] = false; });
}
bindTouch('btn-left',  'ArrowLeft');
bindTouch('btn-right', 'ArrowRight');

// Initial render (show 3D field behind title screen)
camera.lookAt(0, 0.65, -28);
renderer.render(scene, camera);
</script>
</body>
</html>
